            color: transparent;
            margin: 0 50px;
           animation-name: pulse;
           animation-iteration-count: infinite;
           animation-duration: 1.2s;
         }
         .serce::after, .serce::before {
            content: '';
            width: 130px;
            height: 130px;
            background: hotpink;
            border-radius: 50%;
            position: absolute;
            top: 0;
            left: -50%;
            animation-name: pulse;
           animation-iteration-count: infinite;
           animation-duration: 1.2s;
         }
         .serce::after {
            top: -50%;
            left: 0;
            animation-name: pulse;

         }
        @keyframes pulse {
            0% { transform: scale(1) rotate(45deg);background-color: hotpink }
            50% {transform: scale(1.1) rotate(45deg);background-color: aqua;}
            100% { transform: scale(1) rotate(45deg);background-color: gold;}
